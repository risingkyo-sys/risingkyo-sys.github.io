<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Start</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #ffffff;
  --border: #eeeeee;
  --border2: #e0e0e0;
  --text: #111111;
  --dim: #aaaaaa;
  --dim2: #777777;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Noto Sans KR',sans-serif;
  background:var(--bg); color:var(--text);
  height:100vh; overflow:hidden;
  display:grid; grid-template-rows:auto 1fr;
}

/* ── TOP HERO ── */
.top {
  position:relative; overflow:hidden;
  padding:28px 36px 26px;
  border-bottom:1px solid var(--border);
  background: linear-gradient(135deg, #f8f9ff 0%, #fff 50%, #f9f8ff 100%);
  display:flex; align-items:center; justify-content:center;
}
.top::before {
  content:''; position:absolute; inset:0;
  background: radial-gradient(ellipse at 20% 50%, rgba(99,102,241,0.06) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 50%, rgba(16,185,129,0.05) 0%, transparent 60%);
  pointer-events:none;
}
.hero-quote { position:relative; z-index:1; text-align:center; }
.quote-text { font-size:20px; font-weight:600; color:#222; line-height:1.7; font-style:italic; }
.quote-author { font-size:12px; color:var(--dim); margin-top:8px; letter-spacing:2px; text-transform:uppercase; }

/* ── MAIN ── */
.main { display:grid; grid-template-columns:1.05fr 1fr 0.95fr; overflow:hidden; }
.panel { border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
.panel:last-child { border-right:none; }
.ph { padding:11px 22px 9px; border-bottom:1px solid var(--border); flex-shrink:0; }
.ph-title { font-size:10px; font-weight:600; letter-spacing:3px; text-transform:uppercase; color:var(--dim); }
.pb { flex:1; overflow-y:auto; padding:14px 22px; scrollbar-width:thin; scrollbar-color:#eee transparent; }

/* ── LEFT: SCHEDULE ── */
.day-tabs { display:flex; gap:5px; margin-bottom:14px; }
.day-tab {
  flex:1; padding:7px 0; text-align:center;
  font-family:'Inter',sans-serif; font-size:12px; font-weight:600; letter-spacing:1px;
  color:var(--dim); border:1px solid var(--border2); border-radius:5px;
  cursor:pointer; transition:all 0.15s;
}
.day-tab:hover { border-color:#999; color:var(--text); }
.day-tab.active { background:var(--text); border-color:var(--text); color:#fff; }

.tb-schedule { display:flex; flex-direction:column; gap:4px; }
.tb-row { display:flex; gap:10px; align-items:stretch; min-height:40px; }
.tb-time {
  font-family:'Inter',sans-serif; font-size:12px; font-weight:500;
  color:var(--dim); width:58px; flex-shrink:0; display:flex; align-items:center;
}
.tb-time.now-time { color:var(--text); font-weight:700; font-size:13px; }

.tb-block {
  flex:1; padding:9px 16px; border-left:2px solid var(--border2);
  display:flex; flex-direction:column; justify-content:center;
  border-radius:0 5px 5px 0; transition:all 0.3s;
}
/* 기본 블록 */
.tb-block.free    { border-left-color:#e5e7eb; background:#fafafa; }
.tb-block.frog    { border-left-color:#f59e0b; background:#fffbeb; }
.tb-block.clinic  { border-left-color:#3b82f6; background:#eff6ff; }
.tb-block.surgery { border-left-color:#ef4444; background:#fff1f2; }
.tb-block.proc    { border-left-color:#8b5cf6; background:#f5f3ff; }
.tb-block.excel   { border-left-color:#217346; background:#f0faf4; }
.tb-block.family  { border-left-color:#22c55e; background:#f0fdf4; }
.tb-block.sleep   { border-left-color:#d1d5db; background:#fafafa; }
.tb-block.transit { border-left-color:#9ca3af; background:#f9fafb; }
.tb-block.done    { opacity:0.35; }

/* ★ 현재 시간대 — 강렬한 강조 */
.tb-block.now {
  border-left-width: 5px;
  transform: translateX(4px);
  border-radius: 0 6px 6px 0;
}
.tb-block.now .tb-name { font-weight:700; font-size:15px; }
.tb-block.now.free    { border-left-color:#6366f1; background:#eef2ff; box-shadow:0 3px 16px rgba(99,102,241,0.25); }
.tb-block.now.frog    { border-left-color:#d97706; background:#fde68a; box-shadow:0 3px 16px rgba(245,158,11,0.3); }
.tb-block.now.clinic  { border-left-color:#1d4ed8; background:#bfdbfe; box-shadow:0 3px 16px rgba(29,78,216,0.3); }
.tb-block.now.surgery { border-left-color:#b91c1c; background:#fecaca; box-shadow:0 3px 16px rgba(185,28,28,0.3); }
.tb-block.now.proc    { border-left-color:#6d28d9; background:#ddd6fe; box-shadow:0 3px 16px rgba(109,40,217,0.3); }
.tb-block.now.excel   { border-left-color:#155724; background:#c3e6cb; box-shadow:0 3px 16px rgba(33,115,70,0.3); }
.tb-block.now.family  { border-left-color:#15803d; background:#bbf7d0; box-shadow:0 3px 16px rgba(21,128,61,0.3); }
.tb-block.now.transit { border-left-color:#374151; background:#e5e7eb; box-shadow:0 3px 16px rgba(55,65,81,0.2); }
.tb-block.now.sleep   { border-left-color:#6b7280; background:#e5e7eb; }

.tb-name { font-size:14px; font-weight:500; color:var(--text); transition:all 0.3s; }
.tb-block.free .tb-name { color:var(--dim); font-weight:300; font-size:12px; }
.tb-block.span2 { min-height:84px; }
.tb-block.span3 { min-height:128px; }

/* ── CENTER: BIG CLOCK + POMODORO ── */
.center-clock-wrap {
  text-align:center; padding:14px 0 12px;
  border-bottom:1px solid var(--border); flex-shrink:0;
}
.center-clock {
  font-family:'Inter',sans-serif; font-size:112px; font-weight:200;
  color:var(--text); letter-spacing:-6px; line-height:1;
}
.center-date { font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--dim); margin-top:4px; }

.pomo-wrap { display:flex; flex-direction:column; align-items:center; padding:12px 0 0; }
.pomo-settings { display:flex; gap:8px; margin-bottom:12px; width:100%; }
.pomo-set-group { flex:1; display:flex; flex-direction:column; gap:5px; }
.pomo-set-label { font-size:12px; letter-spacing:2px; text-transform:uppercase; color:var(--dim); }
.pomo-set-row { display:flex; align-items:center; gap:5px; }
.pomo-set-row button {
  width:24px; height:24px; background:#f3f4f6; border:1px solid var(--border2);
  color:var(--text); border-radius:4px; cursor:pointer; font-size:14px;
  display:flex; align-items:center; justify-content:center; transition:background 0.15s;
}
.pomo-set-row button:hover { background:#e5e7eb; }
.pomo-set-val { font-family:'Inter',sans-serif; font-size:17px; font-weight:500; color:var(--text); min-width:28px; text-align:center; }
.pomo-set-unit { font-size:13px; color:var(--dim); }

.ring-wrap { position:relative; width:220px; height:220px; margin-bottom:10px; flex-shrink:0; }
svg.ring { width:220px; height:220px; transform:rotate(90deg) scaleX(-1); }
.ring-bg { fill:none; stroke:#eeeeee; stroke-width:10; }
.ring-fg { fill:none; stroke-width:10; stroke-linecap:round; transition:stroke-dashoffset 0.5s, stroke 0.5s; }
.ring-focus { stroke:#6366f1; }
.ring-break { stroke:#10b981; }
.ring-label { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; }
.ring-time { font-family:'Inter',sans-serif; font-size:46px; font-weight:200; color:var(--text); line-height:1; letter-spacing:-2px; }
.ring-mode { font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--dim); margin-top:6px; }

.pomo-controls { display:flex; gap:8px; margin-bottom:10px; }
.pomo-btn { padding:10px 28px; border-radius:6px; font-size:15px; font-family:'Noto Sans KR',sans-serif; font-weight:500; cursor:pointer; transition:all 0.15s; border:none; }
.btn-start { background:#6366f1; color:#fff; }
.btn-start:hover { background:#4f46e5; }
.btn-reset { background:#f3f4f6; color:#555; border:1px solid var(--border2); }
.btn-reset:hover { background:#e5e7eb; }

.pomo-stats { display:flex; gap:20px; margin-bottom:10px; }
.stat { text-align:center; }
.stat-val { font-family:'Inter',sans-serif; font-size:24px; font-weight:300; color:var(--text); }
.stat-label { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--dim); margin-top:2px; }

.cycles { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; margin-bottom:14px; }
.cycle-dot { width:9px; height:9px; border-radius:50%; background:#eee; border:1px solid #ddd; transition:all 0.3s; }
.cycle-dot.done { background:#6366f1; border-color:#6366f1; }

.focus-divider { width:100%; border:none; border-top:1px solid var(--border); margin-bottom:12px; }
.focus-label { font-size:12px; letter-spacing:2px; text-transform:uppercase; color:var(--dim); margin-bottom:10px; width:100%; }
.focus-row { display:flex; align-items:flex-start; gap:10px; margin-bottom:10px; width:100%; }
.focus-num { font-family:'Inter',sans-serif; font-size:14px; color:var(--dim); padding-top:7px; width:16px; flex-shrink:0; }
.focus-input {
  flex:1; background:transparent; border:none; border-bottom:1px solid var(--border2);
  color:var(--text); font-size:16px; font-family:'Noto Sans KR',sans-serif;
  padding:6px 2px; outline:none; transition:border-color 0.2s; resize:none; line-height:1.5;
}
.focus-input::placeholder { color:#ccc; }
.focus-input:focus { border-bottom-color:#111; }

/* ── RIGHT ── */
.section-title { font-size:11px; font-weight:600; letter-spacing:3px; text-transform:uppercase; color:var(--dim); margin-bottom:10px; padding-bottom:7px; border-bottom:1px solid var(--border); }
.mw-section { margin-bottom:16px; }

.weather-today { display:flex; align-items:center; gap:14px; margin-bottom:8px; }
.w-icon { font-size:38px; line-height:1; }
.w-temp { font-family:'Inter',sans-serif; font-size:38px; font-weight:200; color:var(--text); line-height:1; letter-spacing:-1px; }
.w-desc { font-size:13px; color:var(--dim2); margin-top:2px; }
.w-sub { display:flex; gap:10px; margin-bottom:10px; flex-wrap:wrap; }
.w-sub-item { font-size:13px; color:var(--dim2); }
.w-sub-item b { color:var(--text); font-weight:500; }

.aqi-bar { display:flex; gap:7px; margin-bottom:12px; }
.aqi-card { flex:1; padding:7px 10px; border-radius:5px; border:1px solid var(--border); text-align:center; }
.aqi-label { font-size:11px; color:var(--dim); margin-bottom:3px; }
.aqi-val { font-size:14px; font-weight:600; }
.aqi-good     { background:#f0fdf4; color:#16a34a; border-color:#bbf7d0; }
.aqi-moderate { background:#fffbeb; color:#d97706; border-color:#fde68a; }
.aqi-bad      { background:#fff1f2; color:#dc2626; border-color:#fecaca; }
.aqi-verybad  { background:#fdf4ff; color:#9333ea; border-color:#e9d5ff; }

.weekly-weather { display:flex; gap:3px; margin-bottom:14px; }
.ww-day { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:7px 3px; border-radius:5px; border:1px solid var(--border); }
.ww-day.today { background:#f5f5f5; border-color:#ccc; }
.ww-dayname { font-size:11px; color:var(--dim); font-weight:600; }
.ww-icon { font-size:18px; }
.ww-hi { font-size:13px; font-weight:600; color:var(--text); }
.ww-lo { font-size:12px; color:var(--dim); }

.fx-row { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; background:#fafafa; border-radius:6px; border:1px solid var(--border); margin-bottom:14px; }
.fx-name { font-size:14px; font-weight:500; color:var(--text); }
.fx-right { text-align:right; }
.fx-val { font-family:'Inter',sans-serif; font-size:20px; font-weight:300; color:var(--text); }
.fx-sub { font-size:11px; color:var(--dim); margin-top:1px; }

/* 퀵링크 */
.link-grid { display:grid; grid-template-columns:1fr 1fr; gap:7px; }
.ql {
  display:flex; align-items:center; gap:10px;
  padding:11px 13px; border-radius:7px; border:1px solid var(--border);
  text-decoration:none; color:var(--text);
  transition:all 0.15s; background:#fafafa; cursor:pointer;
}
.ql:hover { background:#f3f4f6; border-color:#ccc; transform:translateY(-1px); box-shadow:0 2px 8px rgba(0,0,0,0.07); }
.ql-icon {
  width:20px; height:20px; flex-shrink:0;
  object-fit:contain; border-radius:3px;
}
.ql-icon-fallback { width:20px; height:20px; flex-shrink:0; font-size:18px; line-height:1; display:flex; align-items:center; justify-content:center; }
.ql-name { font-size:13px; font-weight:500; color:var(--text); }

.updated { font-size:10px; color:var(--dim); margin-top:10px; letter-spacing:1px; }
.loading { font-size:12px; color:var(--dim); font-style:italic; }
.error-msg { font-size:11px; color:#f87171; }
</style>
</head>
<body>

<!-- TOP: 명언만 -->
<div class="top">
  <div class="hero-quote">
    <div class="quote-text" id="quoteText">—</div>
    <div class="quote-author" id="quoteAuthor"></div>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- LEFT: SCHEDULE -->
  <div class="panel">
    <div class="ph"><span class="ph-title">Daily Schedule</span></div>
    <div class="pb">
      <div class="day-tabs">
        <div class="day-tab" id="tab-1" onclick="setDay(1)">MON</div>
        <div class="day-tab" id="tab-2" onclick="setDay(2)">TUE</div>
        <div class="day-tab" id="tab-3" onclick="setDay(3)">WED</div>
        <div class="day-tab" id="tab-4" onclick="setDay(4)">THU</div>
        <div class="day-tab" id="tab-5" onclick="setDay(5)">FRI</div>
      </div>
      <div class="tb-schedule" id="schedule"></div>
    </div>
  </div>

  <!-- CENTER: BIG CLOCK + POMODORO -->
  <div class="panel">
    <div class="center-clock-wrap">
      <div class="center-clock" id="centerClock">00:00</div>
      <div class="center-date" id="centerDate">---</div>
    </div>
    <div class="pb">
      <div class="pomo-wrap">
        <div class="pomo-settings">
          <div class="pomo-set-group">
            <div class="pomo-set-label">집중</div>
            <div class="pomo-set-row">
              <button onclick="adjFocus(-5)">−</button>
              <div class="pomo-set-val" id="focusVal">25</div>
              <button onclick="adjFocus(5)">+</button>
              <span class="pomo-set-unit">분</span>
            </div>
          </div>
          <div class="pomo-set-group">
            <div class="pomo-set-label">휴식</div>
            <div class="pomo-set-row">
              <button onclick="adjBreak(-1)">−</button>
              <div class="pomo-set-val" id="breakVal">5</div>
              <button onclick="adjBreak(1)">+</button>
              <span class="pomo-set-unit">분</span>
            </div>
          </div>
          <div class="pomo-set-group">
            <div class="pomo-set-label">목표</div>
            <div class="pomo-set-row">
              <button onclick="adjGoal(-1)">−</button>
              <div class="pomo-set-val" id="goalVal">4</div>
              <button onclick="adjGoal(1)">+</button>
              <span class="pomo-set-unit">회</span>
            </div>
          </div>
        </div>
        <div class="ring-wrap">
          <svg class="ring" viewBox="0 0 220 220">
            <circle class="ring-bg" cx="110" cy="110" r="95"/>
            <circle class="ring-fg ring-focus" id="ringFg" cx="110" cy="110" r="95"
              stroke-dasharray="596.90" stroke-dashoffset="0"/>
          </svg>
          <div class="ring-label">
            <div class="ring-time" id="timerDisplay">25:00</div>
            <div class="ring-mode" id="modeLabel">FOCUS</div>
          </div>
        </div>
        <div class="pomo-controls">
          <button class="pomo-btn btn-start" id="startBtn" onclick="toggleTimer()">시작</button>
          <button class="pomo-btn btn-reset" onclick="resetTimer()">리셋</button>
        </div>
        <div class="pomo-stats">
          <div class="stat"><div class="stat-val" id="completedCount">0</div><div class="stat-label">완료</div></div>
          <div class="stat"><div class="stat-val" id="totalFocus">0분</div><div class="stat-label">누적 집중</div></div>
          <div class="stat"><div class="stat-val" id="goalProgress">0/4</div><div class="stat-label">목표</div></div>
        </div>
        <div class="cycles" id="cycleDots"></div>
        <hr class="focus-divider">
        <div class="focus-label">오늘 집중할 과업</div>
        <div class="focus-row"><div class="focus-num">1</div><textarea class="focus-input" id="task1" rows="1" placeholder="첫 번째 과업..."></textarea></div>
        <div class="focus-row"><div class="focus-num">2</div><textarea class="focus-input" id="task2" rows="1" placeholder="두 번째 과업..."></textarea></div>
        <div class="focus-row"><div class="focus-num">3</div><textarea class="focus-input" id="task3" rows="1" placeholder="세 번째 과업..."></textarea></div>
      </div>
    </div>
  </div>

  <!-- RIGHT: BRIEF + LINKS -->
  <div class="panel">
    <div class="ph"><span class="ph-title">Today's Brief</span></div>
    <div class="pb">

      <div class="mw-section">
        <div class="section-title">날씨 — 고양시</div>
        <div id="weather-today"><div class="loading">불러오는 중...</div></div>
        <div id="weather-aqi"></div>
        <div id="weather-weekly"></div>
      </div>

      <div class="mw-section">
        <div class="section-title">환율</div>
        <div id="fx-content"><div class="loading">불러오는 중...</div></div>
      </div>

      <div class="mw-section">
        <div class="section-title">Quick Links</div>
        <div class="link-grid" id="quickLinks"></div>
        <div class="updated" id="updated-time"></div>
      </div>

    </div>
  </div>

</div>

<script>
// ── 퀵링크 정의 ──
// target: '_blank' = 새창, 'app' = 앱 URL스킴
const LINKS = [
  { name:'Obsidian',    href:'obsidian://open',          favicon:'https://obsidian.md/favicon.ico',                target:'app' },
  { name:'Notion',      href:'notion://',                favicon:'https://www.notion.so/front-static/favicon.ico', target:'app' },
  { name:'통합가계부',  href:'https://docs.google.com/spreadsheets/d/1kzI_CiFWc7MWYQxZSwmGTMQ2orgtb-2bXD_U7Ig8diY/edit?gid=1329667526#gid=1329667526', favicon:'https://ssl.gstatic.com/docs/spreadsheets/favicon3.ico', target:'new_window' },
  { name:'NCC 메일',    href:'https://mail.ncc.re.kr',   favicon:'https://www.google.com/s2/favicons?sz=64&domain=ncc.re.kr', target:'new_window' },
  { name:'Gemini',      href:'https://gemini.google.com',favicon:'https://www.gstatic.com/lamda/images/gemini_sparkle_v002_d4735304ff6292a690345.svg', target:'new_window' },
  { name:'NotebookLM',  href:'https://notebooklm.google.com', favicon:'https://notebooklm.google.com/favicon.ico', target:'new_window' },
  { name:'Claude',      href:'claude://',                favicon:'https://claude.ai/favicon.ico',                  target:'app' },
  { name:'YouTube',     href:'youtube://',               favicon:'https://www.youtube.com/favicon.ico',            target:'app', fallback:'https://youtube.com' },
  { name:'캘린더',      href:'ical://',                  favicon:'https://www.google.com/s2/favicons?sz=64&domain=apple.com', target:'app' },
  { name:'GitHub',      href:'https://github.com/risingkyo-sys', favicon:'https://github.com/favicon.ico', target:'new_window' },
];

function buildLinks() {
  const grid = document.getElementById('quickLinks');
  LINKS.forEach(l => {
    const a = document.createElement('a');
    a.className = 'ql';
    a.href = l.href;
    if (l.target === '_blank') a.target = '_blank';

    // 새창으로 열기 — 화면 오른쪽 절반 (2분할)
    if (l.target === 'new_window') {
      a.addEventListener('click', e => {
        e.preventDefault();
        const w = Math.round(window.screen.width * 2 / 3);
        const h = window.screen.height;
        window.open(l.href, '_blank', `noopener,noreferrer,width=${w},height=${h},left=${window.screen.width - w},top=0`);
      });
    }

    // YouTube: 앱 시도 후 실패하면 새창 (오른쪽 2/3)
    if (l.fallback) {
      a.addEventListener('click', e => {
        e.preventDefault();
        const start = Date.now();
        window.location = l.href;
        setTimeout(() => {
          const w = Math.round(window.screen.width * 2 / 3);
          const h = window.screen.height;
          if (Date.now() - start < 1500) window.open(l.fallback, '_blank', `noopener,noreferrer,width=${w},height=${h},left=${window.screen.width - w},top=0`);
        }, 800);
      });
    }

    const img = document.createElement('img');
    img.className = 'ql-icon';
    img.src = l.favicon;
    img.alt = l.name;
    img.onerror = () => {
      const span = document.createElement('span');
      span.className = 'ql-icon-fallback';
      span.textContent = l.name[0];
      a.replaceChild(span, img);
    };

    const span = document.createElement('span');
    span.className = 'ql-name';
    span.textContent = l.name;

    a.appendChild(img);
    a.appendChild(span);
    grid.appendChild(a);
  });

function blockRange(t){const p=t.replace('–','-').split('-');return[parseInt(p[0]),parseInt(p[1])];}
let currentDay=new Date().getDay();
if(currentDay===0||currentDay===6)currentDay=1;

function setDay(d){
  currentDay=d;
  document.querySelectorAll('.day-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+d).classList.add('active');
  renderSchedule();
}
function renderSchedule(){
  const cur=new Date().getHours()+new Date().getMinutes()/60;
  const wrap=document.getElementById('schedule');wrap.innerHTML='';
  SCHEDULES[currentDay].forEach(b=>{
    const[s,e]=blockRange(b.time);
    const isNow=cur>=s&&cur<e,isDone=cur>=e;
    const row=document.createElement('div');row.className='tb-row';
    row.innerHTML=`
      <div class="tb-time${isNow?' now-time':''}">${b.time}</div>
      <div class="tb-block ${b.type}${isNow?' now':''}${isDone&&b.type!=='family'&&b.type!=='sleep'?' done':''}${b.span?' span'+b.span:''}">
        <div class="tb-name">${b.name||'— 자유 블록 —'}</div>
      </div>`;
    wrap.appendChild(row);
  });
}

// ── CLOCK ──
function updClock(){
  const now=new Date(),h=now.getHours(),m=now.getMinutes();
  const hh=String(h).padStart(2,'0'),mm=String(m).padStart(2,'0');
  document.getElementById('centerClock').textContent=`${hh}:${mm}`;
  const D=['SUN','MON','TUE','WED','THU','FRI','SAT'],M=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  document.getElementById('centerDate').textContent=`${now.getFullYear()} · ${M[now.getMonth()]} ${String(now.getDate()).padStart(2,'0')} · ${D[now.getDay()]}`;
  renderSchedule();
}

// ── POMODORO ──
const CIRC=2*Math.PI*95;
let focusMin=25,breakMin=5,goalCount=4;
let totalSec,remaining,isRunning=false,isFocus=true;
let completedSessions=0,totalFocusSec=0,timerInterval=null;

function initTimer(){totalSec=remaining=focusMin*60;isFocus=true;document.getElementById('modeLabel').textContent='FOCUS';document.getElementById('ringFg').className.baseVal='ring-fg ring-focus';document.getElementById('ringFg').style.strokeDashoffset='0';updDisplay();renderDots();}
function adjFocus(d){if(isRunning)return;focusMin=Math.max(5,Math.min(90,focusMin+d));document.getElementById('focusVal').textContent=focusMin;initTimer();}
function adjBreak(d){if(isRunning)return;breakMin=Math.max(1,Math.min(30,breakMin+d));document.getElementById('breakVal').textContent=breakMin;}
function adjGoal(d){goalCount=Math.max(1,Math.min(12,goalCount+d));document.getElementById('goalVal').textContent=goalCount;renderDots();updStats();}
function toggleTimer(){if(isRunning){clearInterval(timerInterval);isRunning=false;document.getElementById('startBtn').textContent='재개';}else{isRunning=true;document.getElementById('startBtn').textContent='일시정지';timerInterval=setInterval(tick,1000);}}
function tick(){
  remaining--;if(isFocus)totalFocusSec++;updDisplay();updRing();
  if(remaining<=0){clearInterval(timerInterval);isRunning=false;
    if(isFocus){completedSessions++;updStats();renderDots();isFocus=false;totalSec=remaining=breakMin*60;document.getElementById('modeLabel').textContent='BREAK';document.getElementById('ringFg').className.baseVal='ring-fg ring-break';document.getElementById('startBtn').textContent='휴식 시작';playBeep(880);}
    else{isFocus=true;totalSec=remaining=focusMin*60;document.getElementById('modeLabel').textContent='FOCUS';document.getElementById('ringFg').className.baseVal='ring-fg ring-focus';document.getElementById('startBtn').textContent='시작';playBeep(440);}
    updDisplay();updRing();}
}
function resetTimer(){clearInterval(timerInterval);isRunning=false;document.getElementById('startBtn').textContent='시작';initTimer();}
function updDisplay(){const m=Math.floor(remaining/60),s=remaining%60;document.getElementById('timerDisplay').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;}
function updRing(){document.getElementById('ringFg').style.strokeDashoffset=CIRC*(1-remaining/totalSec);}
function updStats(){document.getElementById('completedCount').textContent=completedSessions;document.getElementById('totalFocus').textContent=Math.floor(totalFocusSec/60)+'분';document.getElementById('goalProgress').textContent=`${Math.min(completedSessions,goalCount)}/${goalCount}`;}
function renderDots(){const w=document.getElementById('cycleDots');w.innerHTML='';for(let i=0;i<goalCount;i++){const d=document.createElement('div');d.className='cycle-dot'+(i<completedSessions?' done':'');w.appendChild(d);}}
function playBeep(f){try{const c=new(window.AudioContext||window.webkitAudioContext)();const o=c.createOscillator();const g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;g.gain.setValueAtTime(0.3,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.8);o.start();o.stop(c.currentTime+0.8);}catch(e){}}

async function fetchWeather(){
  try{
    const res=await fetch('https://api.open-meteo.com/v1/forecast?latitude=37.6584&longitude=126.8320&current=temperature_2m,weathercode,windspeed_10m,relativehumidity_2m,apparent_temperature&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=Asia%2FSeoul&forecast_days=7');
    const d=await res.json();const c=d.current,daily=d.daily;
    document.getElementById('weather-today').innerHTML=`
      <div class="weather-today">
        <div class="w-icon">${WX_ICONS[c.weathercode]||'🌡️'}</div>
        <div><div class="w-temp">${Math.round(c.temperature_2m)}°</div><div class="w-desc">${WX_DESC[c.weathercode]||''} · 체감 ${Math.round(c.apparent_temperature)}°</div></div>
      </div>
      <div class="w-sub">
        <div class="w-sub-item">최고 <b>${Math.round(daily.temperature_2m_max[0])}°</b></div>
        <div class="w-sub-item">최저 <b>${Math.round(daily.temperature_2m_min[0])}°</b></div>
        <div class="w-sub-item">습도 <b>${c.relativehumidity_2m}%</b></div>
        <div class="w-sub-item">바람 <b>${Math.round(c.windspeed_10m)}km/h</b></div>
      </div>`;
    let ww='<div class="weekly-weather">';
    for(let i=0;i<7;i++){const dt=new Date(daily.time[i]);ww+=`<div class="ww-day${i===0?' today':''}"><div class="ww-dayname">${DAYS_KR[dt.getDay()]}</div><div class="ww-icon">${WX_ICONS[daily.weathercode[i]]||'🌡️'}</div><div class="ww-hi">${Math.round(daily.temperature_2m_max[i])}°</div><div class="ww-lo">${Math.round(daily.temperature_2m_min[i])}°</div></div>`;}
    ww+='</div>';document.getElementById('weather-weekly').innerHTML=ww;
  }catch(e){document.getElementById('weather-today').innerHTML='<div class="error-msg">날씨 로드 실패</div>';}
}

async function fetchAQI(){
  try{
    const res=await fetch('https://air-quality-api.open-meteo.com/v1/air-quality?latitude=37.6584&longitude=126.8320&current=pm10,pm2_5&timezone=Asia%2FSeoul');
    const d=await res.json();
    const pm10=Math.round(d.current.pm10),pm25=Math.round(d.current.pm2_5);
    function cls(v,t){if(t==='10'){return v<=30?'aqi-good':v<=80?'aqi-moderate':v<=150?'aqi-bad':'aqi-verybad';}return v<=15?'aqi-good':v<=35?'aqi-moderate':v<=75?'aqi-bad':'aqi-verybad';}
    function lbl(v,t){if(t==='10'){return v<=30?'좋음':v<=80?'보통':v<=150?'나쁨':'매우나쁨';}return v<=15?'좋음':v<=35?'보통':v<=75?'나쁨':'매우나쁨';}
    document.getElementById('weather-aqi').innerHTML=`<div class="aqi-bar"><div class="aqi-card ${cls(pm10,'10')}"><div class="aqi-label">PM10</div><div class="aqi-val">${pm10} <small style="font-size:10px;font-weight:400;">${lbl(pm10,'10')}</small></div></div><div class="aqi-card ${cls(pm25,'25')}"><div class="aqi-label">PM2.5</div><div class="aqi-val">${pm25} <small style="font-size:10px;font-weight:400;">${lbl(pm25,'25')}</small></div></div></div>`;
  }catch(e){}
}

async function fetchFX(){
  try{
    const res=await fetch('https://api.frankfurter.app/latest?from=USD&to=KRW');
    const d=await res.json();
    document.getElementById('fx-content').innerHTML=`<div class="fx-row"><div class="fx-name">USD / KRW</div><div class="fx-right"><div class="fx-val">₩ ${Math.round(d.rates.KRW).toLocaleString()}</div><div class="fx-sub">${d.date} 기준</div></div></div>`;
  }catch(e){document.getElementById('fx-content').innerHTML='<div class="error-msg">환율 로드 실패</div>';}
}

async function fetchAll(){
  await Promise.all([fetchWeather(),fetchAQI(),fetchFX()]);
  const now=new Date();
  document.getElementById('updated-time').textContent=`업데이트 ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
