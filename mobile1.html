<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Start</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#ffffff; --border:#eeeeee; --border2:#e0e0e0;
  --text:#111111; --dim:#aaaaaa; --dim2:#777777;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family:'Noto Sans KR',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-y:auto; }

/* TOP */
.top { position:relative; overflow:hidden; padding:28px 24px 24px; border-bottom:1px solid var(--border); background:linear-gradient(135deg,#f8f9ff 0%,#fff 50%,#f9f8ff 100%); text-align:center; }
.top::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at 20% 50%,rgba(99,102,241,0.06) 0%,transparent 60%),radial-gradient(ellipse at 80% 50%,rgba(16,185,129,0.05) 0%,transparent 60%); pointer-events:none; }
.clock { font-family:'Inter',sans-serif; font-size:72px; font-weight:200; letter-spacing:-3px; line-height:1; position:relative; z-index:1; }
.date-str { font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--dim); margin-top:4px; position:relative; z-index:1; }
.quote-text { font-size:14px; font-weight:500; color:#333; font-style:italic; line-height:1.6; margin-top:14px; position:relative; z-index:1; }
.quote-author { font-size:10px; color:var(--dim); margin-top:4px; letter-spacing:2px; text-transform:uppercase; position:relative; z-index:1; }

/* SECTION */
.section { padding:18px 20px 0; }
.section-title { font-size:10px; font-weight:600; letter-spacing:3px; text-transform:uppercase; color:var(--dim); margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid var(--border); }
.section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid var(--border); }
.section-header .section-title { margin-bottom:0; padding-bottom:0; border-bottom:none; }
.reset-btn { padding:5px 10px; background:#f3f4f6; border:1px solid var(--border2); border-radius:6px; font-size:11px; color:var(--dim2); cursor:pointer; font-family:'Noto Sans KR',sans-serif; -webkit-tap-highlight-color:rgba(0,0,0,0.05); }
.reset-btn:active { background:#e5e7eb; }

/* SCHEDULE */
.day-tabs { display:flex; gap:5px; margin-bottom:12px; }
.day-tab { flex:1; padding:8px 0; text-align:center; font-family:'Inter',sans-serif; font-size:11px; font-weight:600; letter-spacing:1px; color:var(--dim); border:1px solid var(--border2); border-radius:6px; cursor:pointer; transition:all 0.15s; }
.day-tab.active { background:var(--text); border-color:var(--text); color:#fff; }
.tb-schedule { display:flex; flex-direction:column; gap:4px; padding-bottom:20px; }
.tb-row { display:flex; gap:10px; align-items:stretch; min-height:44px; }
.tb-time { font-family:'Inter',sans-serif; font-size:11px; font-weight:500; color:var(--dim); width:52px; flex-shrink:0; display:flex; align-items:center; }
.tb-time.now-time { color:var(--text); font-weight:700; font-size:12px; }
.tb-block { flex:1; padding:10px 14px; border-left:2px solid var(--border2); display:flex; align-items:center; border-radius:0 6px 6px 0; transition:all 0.3s; }
.tb-block.free    { border-left-color:#e5e7eb; background:#fafafa; }
.tb-block.frog    { border-left-color:#f59e0b; background:#fffbeb; }
.tb-block.clinic  { border-left-color:#3b82f6; background:#eff6ff; }
.tb-block.surgery { border-left-color:#ef4444; background:#fff1f2; }
.tb-block.proc    { border-left-color:#8b5cf6; background:#f5f3ff; }
.tb-block.excel   { border-left-color:#217346; background:#f0faf4; }
.tb-block.family  { border-left-color:#22c55e; background:#f0fdf4; }
.tb-block.sleep   { border-left-color:#d1d5db; background:#fafafa; }
.tb-block.transit { border-left-color:#9ca3af; background:#f9fafb; }
.tb-block.done    { opacity:0.35; }
.tb-block.now { border-left-width:4px; transform:translateX(3px); }
.tb-block.now .tb-name { font-weight:700; }
.tb-block.now.free    { border-left-color:#6366f1; background:#eef2ff; box-shadow:0 2px 12px rgba(99,102,241,0.2); }
.tb-block.now.frog    { border-left-color:#d97706; background:#fde68a; box-shadow:0 2px 12px rgba(245,158,11,0.25); }
.tb-block.now.clinic  { border-left-color:#1d4ed8; background:#bfdbfe; box-shadow:0 2px 12px rgba(29,78,216,0.25); }
.tb-block.now.surgery { border-left-color:#b91c1c; background:#fecaca; box-shadow:0 2px 12px rgba(185,28,28,0.25); }
.tb-block.now.proc    { border-left-color:#6d28d9; background:#ddd6fe; box-shadow:0 2px 12px rgba(109,40,217,0.25); }
.tb-block.now.excel   { border-left-color:#155724; background:#c3e6cb; box-shadow:0 2px 12px rgba(33,115,70,0.25); }
.tb-block.now.family  { border-left-color:#15803d; background:#bbf7d0; box-shadow:0 2px 12px rgba(21,128,61,0.25); }
.tb-block.now.transit { border-left-color:#374151; background:#e5e7eb; }
.tb-block.now.sleep   { border-left-color:#6b7280; background:#e5e7eb; }
.tb-name { font-size:14px; font-weight:500; color:var(--text); }
.tb-block.free .tb-name { color:var(--dim); font-weight:300; font-size:12px; }
.tb-block.span2 { min-height:92px; }
.tb-block.span3 { min-height:140px; }

/* 이번 주 집중 */
.week-label { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.week-label-title { font-size:13px; font-weight:500; color:var(--text); }
.week-label-range { font-size:11px; color:var(--dim); }
.week-textarea { width:100%; background:#fafafa; border:1px solid var(--border2); border-radius:8px; padding:12px; font-size:14px; font-family:'Noto Sans KR',sans-serif; color:var(--text); resize:none; outline:none; line-height:1.6; min-height:88px; margin-bottom:18px; }
.week-textarea:focus { border-color:#6366f1; }

/* 핵심과업 */
.task-header-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.task-date-input { flex:1; background:#fafafa; border:1px solid var(--border2); border-radius:6px; padding:8px 10px; font-size:13px; font-family:'Noto Sans KR',sans-serif; color:var(--text); outline:none; }
.task-date-input:focus { border-color:#6366f1; }
.task-textarea { width:100%; background:#fafafa; border:1px solid var(--border2); border-radius:8px; padding:12px; font-size:14px; font-family:'Noto Sans KR',sans-serif; color:var(--text); resize:none; outline:none; line-height:1.6; min-height:88px; margin-bottom:18px; }
.task-textarea:focus { border-color:#6366f1; }

/* 루틴 체크 */
.routine-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; padding-bottom:20px; }
.routine-item { display:flex; flex-direction:column; align-items:center; gap:7px; padding:12px 6px; border:1px solid var(--border2); border-radius:10px; background:#fafafa; cursor:pointer; transition:all 0.2s; -webkit-tap-highlight-color:rgba(0,0,0,0.05); }
.routine-item.done { background:#f0fdf4; border-color:#bbf7d0; }
.routine-check { width:22px; height:22px; border-radius:50%; border:2px solid var(--border2); flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
.routine-item.done .routine-check { background:#10b981; border-color:#10b981; }
.routine-check-mark { display:none; width:10px; height:7px; border-left:2px solid white; border-bottom:2px solid white; transform:rotate(-45deg) translate(1px,-1px); }
.routine-item.done .routine-check-mark { display:block; }
.routine-name { font-size:14px; font-weight:500; color:var(--dim2); transition:color 0.2s; }
.routine-item.done .routine-name { color:#15803d; }
.routine-note { font-size:10px; color:var(--dim); margin-top:2px; text-align:right; padding-bottom:4px; }

/* 날씨 */
.weather-wrap { padding-bottom:20px; }
.weather-today { display:flex; align-items:center; gap:16px; margin-bottom:10px; }
.w-icon { font-size:48px; line-height:1; }
.w-temp { font-family:'Inter',sans-serif; font-size:48px; font-weight:200; color:var(--text); line-height:1; letter-spacing:-2px; }
.w-desc { font-size:13px; color:var(--dim2); margin-top:3px; }
.w-sub { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:12px; }
.w-sub-item { font-size:13px; color:var(--dim2); }
.w-sub-item b { color:var(--text); font-weight:500; }
.aqi-bar { display:flex; gap:8px; margin-bottom:14px; }
.aqi-card { flex:1; padding:10px 12px; border-radius:8px; border:1px solid var(--border); text-align:center; }
.aqi-label { font-size:10px; color:var(--dim); margin-bottom:4px; }
.aqi-val { font-size:15px; font-weight:600; }
.aqi-good     { background:#f0fdf4; color:#16a34a; border-color:#bbf7d0; }
.aqi-moderate { background:#fffbeb; color:#d97706; border-color:#fde68a; }
.aqi-bad      { background:#fff1f2; color:#dc2626; border-color:#fecaca; }
.aqi-verybad  { background:#fdf4ff; color:#9333ea; border-color:#e9d5ff; }
.weekly-weather { display:flex; gap:5px; }
.ww-day { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; padding:10px 4px; border-radius:8px; border:1px solid var(--border); }
.ww-day.today { background:#f5f5f5; border-color:#ccc; }
.ww-dayname { font-size:11px; color:var(--dim); font-weight:600; }
.ww-icon { font-size:20px; }
.ww-hi { font-size:13px; font-weight:600; color:var(--text); }
.ww-lo { font-size:12px; color:var(--dim); }

/* 환율 */
.fx-row { display:flex; align-items:center; justify-content:space-between; padding:12px 14px; background:#fafafa; border-radius:8px; border:1px solid var(--border); margin-bottom:18px; }
.fx-name { font-size:13px; font-weight:500; color:var(--text); }
.fx-right { text-align:right; }
.fx-val { font-family:'Inter',sans-serif; font-size:20px; font-weight:300; color:var(--text); }
.fx-sub { font-size:10px; color:var(--dim); margin-top:1px; }

/* 퀵링크 — 4×2 */
.links-wrap { padding-bottom:36px; }
.link-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
.ql {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:6px; aspect-ratio:1/1; border-radius:14px; border:1px solid var(--border);
  text-decoration:none; background:#fafafa;
  transition:all 0.15s; cursor:pointer;
  -webkit-tap-highlight-color:rgba(0,0,0,0.05);
  padding:8px 4px;
}
.ql:active { background:#ececec; transform:scale(0.92); }
.ql-icon { width:32px; height:32px; object-fit:contain; border-radius:7px; }
.ql-icon-emoji { font-size:26px; line-height:1; display:flex; align-items:center; justify-content:center; width:32px; height:32px; }
.ql-icon-fallback { width:32px; height:32px; font-size:20px; display:flex; align-items:center; justify-content:center; font-weight:600; color:var(--dim2); }
.ql-name { display:none; }

.updated { font-size:10px; color:var(--dim); letter-spacing:1px; text-align:right; padding:0 20px 20px; }
.loading { font-size:13px; color:var(--dim); font-style:italic; }
.error-msg { font-size:12px; color:#f87171; }
.divider { height:8px; background:#f5f5f5; border-top:1px solid var(--border); border-bottom:1px solid var(--border); }
</style>
</head>
<body>

<!-- 상단 헤더 -->
<div class="top">
  <div class="clock" id="clock">00:00</div>
  <div class="date-str" id="date">---</div>
  <div class="quote-text" id="quoteText">—</div>
  <div class="quote-author" id="quoteAuthor"></div>
</div>

<!-- 이번 주 집중 -->
<div class="section">
  <div class="section-header">
    <div class="section-title">이번 주 집중</div>
    <button class="reset-btn" onclick="resetWeekFocus()">리셋</button>
  </div>
  <div class="week-label">
    <span class="week-label-title" id="weekTitle">—</span>
    <span class="week-label-range" id="weekRange">—</span>
  </div>
  <textarea class="week-textarea" id="weekFocus" placeholder="이번 주 집중할 것들을 적어요..."></textarea>
</div>

<div class="divider"></div>

<!-- 핵심과업 -->
<div class="section">
  <div class="section-header">
    <div class="section-title">핵심과업</div>
    <button class="reset-btn" onclick="resetTask()">리셋</button>
  </div>
  <div class="task-header-row">
    <input type="date" class="task-date-input" id="taskDate">
  </div>
  <textarea class="task-textarea" id="taskContent" placeholder="오늘 핵심과업을 적어요..."></textarea>
</div>

<div class="divider"></div>

<!-- 루틴 체크 -->
<div class="section">
  <div class="section-header">
    <div class="section-title">오늘 루틴</div>
    <span style="font-size:10px; color:var(--dim);">자정 자동 리셋</span>
  </div>
  <div class="routine-grid">
    <div class="routine-item" id="r-exercise" onclick="toggleRoutine('exercise')">
      <div class="routine-check"><div class="routine-check-mark"></div></div>
      <span class="routine-name">운동</span>
    </div>
    <div class="routine-item" id="r-paper" onclick="toggleRoutine('paper')">
      <div class="routine-check"><div class="routine-check-mark"></div></div>
      <span class="routine-name">논문</span>
    </div>
    <div class="routine-item" id="r-english" onclick="toggleRoutine('english')">
      <div class="routine-check"><div class="routine-check-mark"></div></div>
      <span class="routine-name">영어</span>
    </div>
    <div class="routine-item" id="r-supple" onclick="toggleRoutine('supple')">
      <div class="routine-check"><div class="routine-check-mark"></div></div>
      <span class="routine-name">영양제</span>
    </div>
  </div>
</div>

<div class="divider"></div>

<!-- 데일리 스케줄 -->
<div class="section">
  <div class="section-title">Daily Schedule</div>
  <div class="day-tabs">
    <div class="day-tab" id="tab-1" onclick="setDay(1)">MON</div>
    <div class="day-tab" id="tab-2" onclick="setDay(2)">TUE</div>
    <div class="day-tab" id="tab-3" onclick="setDay(3)">WED</div>
    <div class="day-tab" id="tab-4" onclick="setDay(4)">THU</div>
    <div class="day-tab" id="tab-5" onclick="setDay(5)">FRI</div>
    <div class="day-tab" id="tab-6" onclick="setDay(6)">WKD</div>
  </div>
  <div class="tb-schedule" id="schedule"></div>
</div>

<div class="divider"></div>

<!-- 날씨 -->
<div class="section">
  <div class="section-title">날씨 — 고양시</div>
  <div class="weather-wrap">
    <div id="weather-today"><div class="loading">불러오는 중...</div></div>
    <div id="weather-aqi"></div>
    <div id="weather-weekly"></div>
  </div>
</div>

<div class="divider"></div>

<!-- 환율 -->
<div class="section">
  <div class="section-title">환율</div>
  <div id="fx-content"><div class="loading">불러오는 중...</div></div>
</div>

<div class="divider"></div>

<!-- 퀵링크 -->
<div class="section">
  <div class="section-title">Quick Links</div>
  <div class="links-wrap">
    <div class="link-grid" id="quickLinks"></div>
  </div>
</div>
<div class="updated" id="updated-time"></div>

<script>
// ── 퀵링크 ──
// icon_type: 'img' = favicon, 'emoji' = 이모지
const LINKS = [
  { name:'Obsidian',   href:'obsidian://open',         icon:'https://obsidian.md/favicon.ico',                                   icon_type:'img' },
  { name:'캘린더',     href:'calshow://',               icon:'📅',                                                                icon_type:'emoji' },
  { name:'가계부',     href:'https://docs.google.com/spreadsheets/d/1kzI_CiFWc7MWYQxZSwmGTMQ2orgtb-2bXD_U7Ig8diY/edit?gid=1329667526#gid=1329667526', icon:'https://ssl.gstatic.com/docs/spreadsheets/favicon3.ico', icon_type:'img' },
  { name:'NCC 메일',   href:'https://mail.ncc.re.kr',  icon:'https://www.google.com/s2/favicons?sz=64&domain=ncc.re.kr',         icon_type:'img' },
  { name:'NAVER',      href:'https://naver.com',        icon:'https://www.google.com/s2/favicons?sz=64&domain=naver.com',         icon_type:'img' },
  { name:'Daum',       href:'https://daum.net',         icon:'https://www.google.com/s2/favicons?sz=64&domain=daum.net',          icon_type:'img' },
  { name:'Finviz',     href:'https://finviz.com',       icon:'https://finviz.com/favicon.ico',                                   icon_type:'img' },
  { name:'Evermusic',  href:'evermusic://',              icon:'🎵',                                                                icon_type:'emoji' },
];

function buildLinks(){
  const grid=document.getElementById('quickLinks');
  LINKS.forEach(l=>{
    const a=document.createElement('a');
    a.className='ql'; a.href=l.href;
    if(l.icon_type==='emoji'){
      const ico=document.createElement('span');
      ico.className='ql-icon-emoji'; ico.textContent=l.icon;
      a.appendChild(ico);
    } else {
      const img=document.createElement('img');
      img.className='ql-icon'; img.src=l.icon; img.alt=l.name;
      img.onerror=()=>{
        const sp=document.createElement('span');
        sp.className='ql-icon-fallback'; sp.textContent=l.name[0];
        a.replaceChild(sp,img);
      };
      a.appendChild(img);
    }
    grid.appendChild(a);
  });
}

// ── 명언 ──
const QUOTES=[
  {text:"오늘 하루도 충분히 잘 해낼 수 있어. 시작이 전부다.",author:""},
  {text:"작은 전진이라도 전진이다. 오늘도 한 발 앞으로.",author:""},
  {text:"힘들어도 괜찮아. 버티는 것 자체가 이미 강한 것이다.",author:""},
  {text:"완벽하지 않아도 된다. 오늘 최선을 다하면 충분하다.",author:""},
  {text:"지금 이 순간에 집중하라. 과거도 미래도 아닌, 지금이다.",author:""},
  {text:"You are stronger than you think. Keep going.",author:""},
  {text:"당신이 심는 씨앗은 반드시 꽃을 피운다. 포기하지 마라.",author:""},
  {text:"힘든 길일수록, 그 끝의 풍경은 더 아름답다.",author:""},
  {text:"오늘의 나는 어제의 나보다 분명히 성장했다.",author:""},
  {text:"지치면 잠깐 쉬어도 된다. 멈추지만 않으면 된다.",author:""},
  {text:"The harder you work, the luckier you get.",author:""},
  {text:"두려움이 있다는 건, 그만큼 간절하다는 뜻이다.",author:""},
  {text:"이미 충분히 잘 하고 있다. 오늘도 수고했다.",author:""},
  {text:"루틴이 흔들릴 때도 있다. 내일 다시 시작하면 된다.",author:""},
  {text:"작은 습관이 결국 위대한 삶을 만든다.",author:""},
  {text:"Do what you can, with what you have, where you are.",author:"Theodore Roosevelt"},
  {text:"기대를 낮추지 마라. 노력을 더해라.",author:""},
  {text:"오늘 집중한 한 시간이 내일의 나를 바꾼다.",author:""},
  {text:"당신이 하는 일은 분명히 누군가에게 의미가 있다.",author:""},
  {text:"실패는 끝이 아니다. 포기가 끝이다.",author:""},
  {text:"Start where you are. Use what you have. Do what you can.",author:"Arthur Ashe"},
  {text:"지금 이 순간 최선을 다하는 것, 그것으로 충분하다.",author:""},
  {text:"한 번에 하나씩. 지금 이 일에만 집중하자.",author:""},
  {text:"어제보다 나은 오늘. 그것이 성장이다.",author:""},
  {text:"힘내. 오늘 하루도 당신은 해낼 수 있다.",author:""},
  {text:"Progress, not perfection.",author:""},
  {text:"당신의 노력은 결코 사라지지 않는다. 반드시 쌓인다.",author:""},
  {text:"좋은 하루는 좋은 첫 한 시간에서 시작된다.",author:""},
  {text:"오늘도 당신이 있어서 누군가의 하루가 더 나아진다.",author:""},
  {text:"할 수 있다고 믿는 순간, 이미 절반은 이룬 것이다.",author:""},
];
function todayQuote(){
  const t=new Date();
  return QUOTES[(t.getFullYear()*365+t.getMonth()*31+t.getDate())%QUOTES.length];
}

// ── 스케줄 ──

function blockRange(t){const p=t.split('-');return[parseInt(p[0]),parseInt(p[1])];}
let currentDay=new Date().getDay();
if(currentDay===0||currentDay===6)currentDay=6;

function setDay(d){
  currentDay=d;
  document.querySelectorAll('.day-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+d).classList.add('active');
  renderSchedule();
}
function renderSchedule(){
  const cur=new Date().getHours()+new Date().getMinutes()/60;
  const wrap=document.getElementById('schedule');wrap.innerHTML='';
  SCHEDULES[currentDay].forEach(b=>{
    const[s,e]=blockRange(b.time);
    const isNow=cur>=s&&cur<e,isDone=cur>=e;
    const row=document.createElement('div');row.className='tb-row';
    row.innerHTML=`
      <div class="tb-time${isNow?' now-time':''}">${b.time.replace('-','–')}</div>
      <div class="tb-block ${b.type}${isNow?' now':''}${isDone&&b.type!=='family'&&b.type!=='sleep'?' done':''}${b.span?' span'+b.span:''}">
        <div class="tb-name">${b.name||'— 자유 블록 —'}</div>
      </div>`;
    wrap.appendChild(row);
  });
}

// ── 시계 ──
function updClock(){
  const now=new Date(),h=now.getHours(),m=now.getMinutes();
  document.getElementById('clock').textContent=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  const D=['SUN','MON','TUE','WED','THU','FRI','SAT'],M=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  document.getElementById('date').textContent=`${now.getFullYear()} · ${M[now.getMonth()]} ${String(now.getDate()).padStart(2,'0')} · ${D[now.getDay()]}`;
  renderSchedule();
}

// ── 이번 주 집중 ──
// 월요일 기준 주차 계산
function getWeekInfo(){
  const now=new Date();
  const day=now.getDay(); // 0=일, 1=월
  const diffToMon=day===0?-6:1-day;
  const mon=new Date(now);
  mon.setDate(now.getDate()+diffToMon);
  const sun=new Date(mon);
  sun.setDate(mon.getDate()+6);

  const month=mon.getMonth()+1;
  // 해당 월의 몇 째 주인지 계산 (월요일 기준)
  const firstDay=new Date(mon.getFullYear(),mon.getMonth(),1);
  const firstMon=new Date(firstDay);
  const fd=firstDay.getDay();
  firstMon.setDate(fd===0?2:fd===1?1:9-fd); // 첫 번째 월요일
  const weekNum=Math.round((mon-firstMon)/(7*24*3600*1000))+1;
  const ordinals=['첫','2','3','4','5'];
  const title=`${month}월 ${ordinals[Math.min(weekNum-1,4)]}째주`;

  const fmt=d=>`${d.getMonth()+1}/${d.getDate()}`;
  const range=`${fmt(mon)} (월) ~ ${fmt(sun)} (일)`;
  return {title,range};
}

function initWeekFocus(){
  const {title,range}=getWeekInfo();
  document.getElementById('weekTitle').textContent=title;
  document.getElementById('weekRange').textContent=range;
  const saved=localStorage.getItem('weekFocus')||'';
  document.getElementById('weekFocus').value=saved;
}
document.getElementById('weekFocus').addEventListener('input',e=>{
  localStorage.setItem('weekFocus',e.target.value);
});
function resetWeekFocus(){
  if(confirm('이번 주 집중 내용을 초기화할까요?')){
    localStorage.removeItem('weekFocus');
    document.getElementById('weekFocus').value='';
  }
}

// ── 핵심과업 ──
function initTask(){
  const savedDate=localStorage.getItem('taskDate')||'';
  const savedContent=localStorage.getItem('taskContent')||'';
  const dateEl=document.getElementById('taskDate');
  if(savedDate) dateEl.value=savedDate;
  else {
    const now=new Date();
    dateEl.value=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  }
  document.getElementById('taskContent').value=savedContent;
}
document.getElementById('taskDate').addEventListener('change',e=>{
  localStorage.setItem('taskDate',e.target.value);
});
document.getElementById('taskContent').addEventListener('input',e=>{
  localStorage.setItem('taskContent',e.target.value);
});
function resetTask(){
  if(confirm('핵심과업을 초기화할까요?')){
    localStorage.removeItem('taskDate');
    localStorage.removeItem('taskContent');
    const now=new Date();
    document.getElementById('taskDate').value=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    document.getElementById('taskContent').value='';
  }
}

// ── 루틴 체크 (자정 리셋) ──
const ROUTINES=['exercise','paper','english','supple'];
function getTodayKey(){
  const d=new Date();
  return `routine_${d.getFullYear()}_${d.getMonth()}_${d.getDate()}`;
}
function initRoutine(){
  const key=getTodayKey();
  const saved=JSON.parse(localStorage.getItem(key)||'{}');
  ROUTINES.forEach(r=>{
    const el=document.getElementById('r-'+r);
    if(saved[r]) el.classList.add('done');
  });
  // 오래된 루틴 키 정리
  Object.keys(localStorage).filter(k=>k.startsWith('routine_')&&k!==key).forEach(k=>localStorage.removeItem(k));
}
function toggleRoutine(r){
  const key=getTodayKey();
  const saved=JSON.parse(localStorage.getItem(key)||'{}');
  saved[r]=!saved[r];
  localStorage.setItem(key,JSON.stringify(saved));
  const el=document.getElementById('r-'+r);
  el.classList.toggle('done',saved[r]);
}

const WX_DESC={0:'맑음',1:'대체로 맑음',2:'구름 조금',3:'흐림',45:'안개',48:'안개',51:'이슬비',53:'이슬비',55:'이슬비',61:'비',63:'비',65:'강한 비',71:'눈',73:'눈',75:'강한 눈',80:'소나기',81:'소나기',82:'강한 소나기',95:'뇌우',96:'우박',99:'강한 우박'};
const DAYS_KR=['일','월','화','수','목','금','토'];

async function fetchWeather(){
  try{
    const res=await fetch('https://api.open-meteo.com/v1/forecast?latitude=37.6584&longitude=126.8320&current=temperature_2m,weathercode,windspeed_10m,relativehumidity_2m,apparent_temperature&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=Asia%2FSeoul&forecast_days=7');
    const d=await res.json();const c=d.current,daily=d.daily;
    document.getElementById('weather-today').innerHTML=`
      <div class="weather-today">
        <div class="w-icon">${WX_ICONS[c.weathercode]||'🌡️'}</div>
        <div><div class="w-temp">${Math.round(c.temperature_2m)}°</div><div class="w-desc">${WX_DESC[c.weathercode]||''} · 체감 ${Math.round(c.apparent_temperature)}°</div></div>
      </div>
      <div class="w-sub">
        <div class="w-sub-item">최고 <b>${Math.round(daily.temperature_2m_max[0])}°</b></div>
        <div class="w-sub-item">최저 <b>${Math.round(daily.temperature_2m_min[0])}°</b></div>
        <div class="w-sub-item">습도 <b>${c.relativehumidity_2m}%</b></div>
        <div class="w-sub-item">바람 <b>${Math.round(c.windspeed_10m)}km/h</b></div>
      </div>`;
    let ww='<div class="weekly-weather">';
    for(let i=0;i<7;i++){const dt=new Date(daily.time[i]);ww+=`<div class="ww-day${i===0?' today':''}"><div class="ww-dayname">${DAYS_KR[dt.getDay()]}</div><div class="ww-icon">${WX_ICONS[daily.weathercode[i]]||'🌡️'}</div><div class="ww-hi">${Math.round(daily.temperature_2m_max[i])}°</div><div class="ww-lo">${Math.round(daily.temperature_2m_min[i])}°</div></div>`;}
    ww+='</div>';document.getElementById('weather-weekly').innerHTML=ww;
  }catch(e){document.getElementById('weather-today').innerHTML='<div class="error-msg">날씨 로드 실패</div>';}
}

async function fetchAQI(){
  try{
    const res=await fetch('https://air-quality-api.open-meteo.com/v1/air-quality?latitude=37.6584&longitude=126.8320&current=pm10,pm2_5&timezone=Asia%2FSeoul');
    const d=await res.json();
    const pm10=Math.round(d.current.pm10),pm25=Math.round(d.current.pm2_5);
    function cls(v,t){if(t==='10'){return v<=30?'aqi-good':v<=80?'aqi-moderate':v<=150?'aqi-bad':'aqi-verybad';}return v<=15?'aqi-good':v<=35?'aqi-moderate':v<=75?'aqi-bad':'aqi-verybad';}
    function lbl(v,t){if(t==='10'){return v<=30?'좋음':v<=80?'보통':v<=150?'나쁨':'매우나쁨';}return v<=15?'좋음':v<=35?'보통':v<=75?'나쁨':'매우나쁨';}
    document.getElementById('weather-aqi').innerHTML=`<div class="aqi-bar"><div class="aqi-card ${cls(pm10,'10')}"><div class="aqi-label">PM10</div><div class="aqi-val">${pm10} <small style="font-size:11px;font-weight:400;">${lbl(pm10,'10')}</small></div></div><div class="aqi-card ${cls(pm25,'25')}"><div class="aqi-label">PM2.5</div><div class="aqi-val">${pm25} <small style="font-size:11px;font-weight:400;">${lbl(pm25,'25')}</small></div></div></div>`;
  }catch(e){}
}

async function fetchFX(){
  try{
    const res=await fetch('https://api.frankfurter.app/latest?from=USD&to=KRW');
    const d=await res.json();
    document.getElementById('fx-content').innerHTML=`<div class="fx-row"><div class="fx-name">USD / KRW</div><div class="fx-right"><div class="fx-val">₩ ${Math.round(d.rates.KRW).toLocaleString()}</div><div class="fx-sub">${d.date} 기준</div></div></div>`;
  }catch(e){document.getElementById('fx-content').innerHTML='<div class="error-msg">환율 로드 실패</div>';}
}

async function fetchAll(){
  await Promise.all([fetchWeather(),fetchAQI(),fetchFX()]);
  const now=new Date();
  document.getElementById('updated-time').textContent=`업데이트 ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
}
